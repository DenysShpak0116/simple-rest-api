host: localhost:8081
info:
  contact: {}
  description: This API provides endpoints for managing students, teachers, courses,
    and enrollments.
  title: Simple REST API
  version: "1.0"
paths:
  /courses:
    get:
      description: Retrieve a list of all courses in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ApiResponse-array_internal_handlers_CourseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List all courses
      tags:
      - Courses
    post:
      consumes:
      - application/json
      description: Create a new course with provided information. Validates that the
        teacher_id exists.
      parameters:
      - description: Course creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.ApiResponse-internal_handlers_CourseResponse'
        "400":
          description: Validation error or teacher not found
          schema:
            $ref: '#/definitions/internal_handlers.ValidationError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Create a new course
      tags:
      - Courses
  /courses/{id}:
    delete:
      description: Delete a course by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Delete a course
      tags:
      - Courses
    get:
      description: Retrieve details of a specific course
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ApiResponse-internal_handlers_CourseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Get a course by ID
      tags:
      - Courses
    put:
      consumes:
      - application/json
      description: Update an existing course's information. Validates that the course
        exists and that the teacher_id exists.
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ApiResponse-internal_handlers_CourseResponse'
        "400":
          description: Validation error or teacher not found
          schema:
            $ref: '#/definitions/internal_handlers.ValidationError'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Update a course
      tags:
      - Courses
