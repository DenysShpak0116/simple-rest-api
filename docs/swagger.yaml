          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Update a student
      tags:
      - Students
  /students/{id}/courses/{course_id}:
    delete:
      description: Delete an enrollment, removing a student from a course. Validates
        that both student and course exist.
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course ID
        in: path
        name: course_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Student or course not found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Enrollment not found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Remove student enrollment from a course
      tags:
      - Enrollments
    post:
      description: Add a student enrollment in a course. Validates that both student
        and course exist.
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course ID
        in: path
        name: course_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.ApiResponse-internal_handlers_EnrollmentResponse'
        "400":
          description: Student or course not found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Student already enrolled in course
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Enroll a student in a course
      tags:
      - Enrollments
