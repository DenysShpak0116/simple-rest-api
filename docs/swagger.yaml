    put:
      consumes:
      - application/json
      description: Update an existing student's information
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      - description: Student update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateStudentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
